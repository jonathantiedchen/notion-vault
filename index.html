<!DOCTYPE html>
<html>
<head>
  <style>
    :root { --bg: #191919; --accent: #c4a882; --border: #333; }
    body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; display: flex; align-items: center; height: 100vh; overflow: hidden; }
    .row { display: flex; width: 100%; padding: 0 10px; gap: 8px; align-items: center; }
    input { background: #252525; border: 1px solid var(--border); color: #fff; padding: 8px; border-radius: 5px; font-size: 12px; flex: 1; outline: none; }
    input:focus { border-color: var(--accent); }
    button { background: var(--accent); border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 11px; text-transform: uppercase; }
    .label { color: var(--accent); font-weight: bold; font-size: 12px; white-space: nowrap; }
    #copy-prompt { background: #000; border: 1px dashed var(--accent); color: var(--accent); padding: 8px; font-size: 11px; flex: 1; text-align: center; cursor: pointer; border-radius: 5px; }
  </style>
</head>
<body>
  <div class="row" id="ui">
    <input id="n" placeholder="Name (e.g. WiFi)">
    <input id="v" placeholder="Secret">
    <input id="p" type="password" placeholder="Passphrase">
    <button onclick="lock()">Lock</button>
  </div>

<script>
const E = new TextEncoder(), D = new TextDecoder();
async function k(p, s) {
  const b = await crypto.subtle.importKey('raw', E.encode(p), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2', salt:s, iterations:100000, hash:'SHA-256'}, b, {name:'AES-GCM', length:256}, false, ['encrypt','decrypt']);
}

async function lock() {
  const n = document.getElementById('n').value, v = document.getElementById('v').value, p = document.getElementById('p').value;
  if(!n || !v || !p) return;
  const s = crypto.getRandomValues(new Uint8Array(16)), i = crypto.getRandomValues(new Uint8Array(12));
  const key = await k(p, s);
  const ct = await crypto.subtle.encrypt({name:'AES-GCM', iv:i}, key, E.encode(v));
  const out = new Uint8Array(28 + ct.byteLength);
  out.set(s,0); out.set(i,16); out.set(new Uint8Array(ct),28);
  const url = window.location.origin + window.location.pathname + '#' + btoa(unescape(encodeURIComponent(n))) + '.' + btoa(String.fromCharCode(...out));
  
  document.getElementById('ui').innerHTML = `<div id="copy-prompt">LINK READY: Click here, then Paste (Cmd+V) over this block</div>`;
  document.getElementById('copy-prompt').onclick = async () => {
    try { await navigator.clipboard.writeText(url); } catch(e) { 
      const t = document.createElement("textarea"); t.value = url; document.body.appendChild(t); t.select(); document.execCommand("copy"); document.body.removeChild(t);
    }
    document.getElementById('copy-prompt').innerText = "COPIED! NOW PASTE!";
    document.getElementById('copy-prompt').style.background = "#1a4a1a";
  };
}

async function unlock() {
  const p = document.getElementById('up').value, h = location.hash.slice(1).split('.');
  try {
    const d = Uint8Array.from(atob(h[1]), c => c.charCodeAt(0));
    const key = await k(p, d.slice(0,16));
    const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv:d.slice(16,28)}, key, d.slice(28));
    document.getElementById('ui').innerHTML = `<span class="label">${decodeURIComponent(escape(atob(h[0])))}:</span><input value="${D.decode(pt)}" readonly id="res"><button onclick="copyRes()">Copy</button><button onclick="location.reload()" style="background:#444; color:#fff; margin-left:5px;">Lock</button>`;
  } catch(e) { alert("Wrong Passphrase"); }
}

function copyRes() {
  const r = document.getElementById('res'); r.select(); document.execCommand('copy');
}

if(location.hash && location.hash.includes('.')) {
  const name = decodeURIComponent(escape(atob(location.hash.slice(1).split('.')[0])));
  document.getElementById('ui').innerHTML = `<span class="label">${name}:</span><input type="password" id="up" placeholder="Passphrase"><button onclick="unlock()">Unlock</button>`;
}
</script>
</body>
</html>
