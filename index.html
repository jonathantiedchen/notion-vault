<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notion Vault | Secure Generator</title>
  <style>
    /* NOTION LIGHT MODE (Default) */
    :root { 
      --bg: #ffffff; 
      --text: #37352f; 
      --text-dim: rgba(55, 53, 47, 0.6);
      --border: rgba(55, 53, 47, 0.16);
      --input-bg: rgba(242, 241, 238, 0.6);
      --accent: #c4a882; 
      --radius: 6px; 
    }

    /* NOTION DARK MODE (Auto-switches based on your system theme) */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #191919; /* Notion's exact dark mode background */
        --text: rgba(255, 255, 255, 0.81);
        --text-dim: rgba(255, 255, 255, 0.44);
        --border: rgba(255, 255, 255, 0.13);
        --input-bg: rgba(255, 255, 255, 0.05);
      }
    }
    
    body { 
      background: var(--bg); /* Camouflages into Notion */
      color: var(--text); 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
      margin: 0; 
      display: flex; 
      justify-content: center;
      align-items: center; 
      min-height: 100vh; 
      overflow: hidden;
    }

    #app { width: 100%; box-sizing: border-box; }

    /* --- GENERATOR (LANDING PAGE) STYLES --- */
    .generator-container { width: 100%; max-width: 480px; padding: 20px; margin: auto; }

    .card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }

    .card h1 { font-size: 20px; margin: 0 0 8px 0; color: var(--accent); letter-spacing: 1px; text-align: center; }
    .card p.subtitle { font-size: 13px; color: var(--text-dim); margin: 0 0 24px 0; text-align: center; }

    .field-group { margin-bottom: 18px; }
    .field-label { display: block; font-size: 11px; font-weight: 700; color: var(--accent); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }

    input, textarea, select { 
      background: var(--input-bg); 
      border: 1px solid var(--border); 
      color: var(--text); 
      padding: 10px 12px; 
      border-radius: 6px; 
      font-size: 14px; 
      outline: none; 
      font-family: inherit; 
      box-sizing: border-box; 
      width: 100%;
    }
    input:focus, textarea:focus { border-color: var(--accent); }

    button { 
      background: var(--accent); 
      border: none; 
      padding: 12px; 
      border-radius: 6px; 
      cursor: pointer; 
      font-weight: 700; 
      font-size: 12px; 
      text-transform: uppercase; 
      color: #000; 
      width: 100%;
      margin-top: 10px;
    }

    /* --- NOTION EMBED STYLES (THE ROW) --- */
    .notion-row { 
      display: flex; 
      width: 100%; 
      padding: 0 12px; 
      gap: 12px; 
      align-items: center; 
      box-sizing: border-box;
      height: 100vh;
      background: var(--bg); /* Camouflage applied here too */
    }

    .label-tag { 
      color: var(--accent); 
      font-weight: 700; 
      font-size: 14px; 
      white-space: nowrap; 
      min-width: min-content; 
      flex-shrink: 0; 
    }

    .notion-input { 
        flex: 1; 
        min-width: 50px; 
        background: var(--input-bg);
        border: 1px solid var(--border);
        border-radius: 6px; 
        padding: 8px 10px; 
        font-size: 13px; 
    }
    
    .notion-btn { width: auto; padding: 8px 15px; margin: 0; border-radius: 6px; }

    .scroll-vault { max-height: 180px; overflow-y: auto; padding: 10px; }
    .vault-item { 
        display: flex; 
        align-items: center; 
        background: var(--input-bg); 
        padding: 8px 12px; 
        border-radius: 6px; 
        border: 1px solid var(--border); 
        margin-bottom: 6px; 
        gap: 10px; 
    }
  </style>
</head>
<body>
  <div id="app"></div>

<script>
'use strict';
const E = new TextEncoder(), D = new TextDecoder();

const toB64 = (str) => btoa(unescape(encodeURIComponent(str))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
const fromB64 = (str) => decodeURIComponent(escape(atob(str.replace(/-/g, '+').replace(/_/g, '/'))));

async function deriveKey(pass, salt) {
  const base = await crypto.subtle.importKey('raw', E.encode(pass), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({ name: 'PBKDF2', salt, iterations: 310000, hash: 'SHA-256' }, base, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']);
}

function showGenerator() {
  document.getElementById('app').innerHTML = `
    <div class="generator-container">
      <div class="card">
        <h1>VAULT CREATOR</h1>
        <p class="subtitle">Secure, local-only encryption for Notion</p>
        <div class="field-group">
          <label class="field-label">Type</label>
          <select id="type"><option value="single">Single Secret</option><option value="vault">Multi-Item Vault</option></select>
        </div>
        <div class="field-group">
          <label class="field-label">Display Name</label>
          <input id="name" placeholder="e.g. Git Password" autocomplete="off">
        </div>
        <div id="input-area" class="field-group">
          <label class="field-label">Secret Content</label>
          <input id="val" placeholder="Paste sensitive data here...">
        </div>
        <div class="field-group">
          <label class="field-label">Master Passphrase</label>
          <input id="pass" type="password" placeholder="Used to unlock this in Notion">
        </div>
        <button onclick="generate()">Encrypt & Copy Link</button>
      </div>
    </div>
  `;
  document.getElementById('type').onchange = (e) => {
    const area = document.getElementById('input-area');
    area.innerHTML = e.target.value === 'single' 
      ? '<label class="field-label">Secret Content</label><input id="val" placeholder="Paste sensitive data here...">' 
      : '<label class="field-label">Vault Items</label><textarea id="val" style="height:80px" placeholder="Label: Secret&#10;User: Admin&#10;(One per line)"></textarea>';
  };
}

async function generate() {
  const n = document.getElementById('name').value, v = document.getElementById('val').value, p = document.getElementById('pass').value, t = document.getElementById('type').value;
  if(!n || !v || !p) return alert("Fill all fields.");
  const salt = crypto.getRandomValues(new Uint8Array(16)), iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await deriveKey(p, salt);
  const payload = t === 'single' ? {n, v} : {n, items: v.split('\n').filter(l=>l.trim()).map(l => {
    const parts = l.split(':');
    return parts.length > 1 ? {l: parts[0].trim(), v: parts.slice(1).join(':').trim()} : {l: l.trim(), v: l.trim()};
  })};
  const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, E.encode(JSON.stringify(payload)));
  const blob = new Uint8Array(28 + ct.byteLength);
  blob.set(salt, 0); blob.set(iv, 16); blob.set(new Uint8Array(ct), 28);
  const b64Data = btoa(String.fromCharCode(...blob)).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  const url = window.location.href.split('#')[0] + '#' + toB64(n) + '.' + b64Data;
  await navigator.clipboard.writeText(url);
  document.getElementById('app').innerHTML = `
    <div class="generator-container"><div class="card" style="text-align: center;"><div style="font-size: 48px; margin-bottom: 10px;">🛡️</div><h2 style="color: var(--accent); margin: 0 0 10px 0;">ENCRYPTED & COPIED</h2><button onclick="window.location.reload()" style="background:var(--border); color:var(--text);">Create Another</button></div></div>
  `;
}

async function unlock() {
  const p = document.getElementById('up').value, h = location.hash.slice(1).split('.');
  try {
    const blob = Uint8Array.from(atob(h[1].replace(/-/g, '+').replace(/_/g, '/')), c => c.charCodeAt(0));
    const key = await deriveKey(p, blob.slice(0, 16));
    const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: blob.slice(16, 28) }, key, blob.slice(28));
    const data = JSON.parse(D.decode(pt));
    if(data.items) {
      let html = `<div style="display:flex; flex-direction:column; height:100vh; width:100%;"><div class="notion-row" style="height:auto; justify-content:space-between; border-bottom:1px solid var(--border); padding: 10px 12px;"><span class="label-tag">${data.n}</span><button class="notion-btn" onclick="location.reload()" style="background:var(--border); color:var(--text);">Lock</button></div><div class="scroll-vault">`;
      html += data.items.map(i => `<div class="vault-item"><span class="label-tag" style="font-size:12px; color:var(--text-dim);">${i.l}</span><input class="notion-input" type="password" value="${i.v}" readonly onclick="this.type='text'" onblur="this.type='password'" style="border:none;"><button class="notion-btn" onclick="copyVal('${i.v.replace(/'/g, "\\'")}', this)" style="padding:4px 10px; font-size:10px;">Copy</button></div>`).join('') + `</div></div>`;
      document.getElementById('app').innerHTML = html;
    } else {
      document.getElementById('app').innerHTML = `<div class="notion-row"><span class="label-tag">${data.n}</span><input class="notion-input" type="password" value="${data.v}" readonly id="res" onclick="this.type='text'" onblur="this.type='password'"><button class="notion-btn" onclick="copyVal(document.getElementById('res').value, this)">Copy</button><button class="notion-btn" onclick="location.reload()" style="background:var(--border); color:var(--text);">Lock</button></div>`;
    }
  } catch(e) { alert("Wrong Passphrase"); }
}

function copyVal(t, b) { navigator.clipboard.writeText(t); b.innerText = 'OK'; setTimeout(() => b.innerText = 'Copy', 1000); }

function init() {
  const h = location.hash.slice(1);
  if(h && h.includes('.')) {
    try {
      const name = fromB64(h.split('.')[0]);
      document.getElementById('app').innerHTML = `<div class="notion-row"><span class="label-tag">${name}</span><input class="notion-input" id="up" type="password" placeholder="Passphrase" onkeydown="if(event.key==='Enter') unlock()"><button class="notion-btn" onclick="unlock()">Unlock</button></div>`;
      document.getElementById('up').focus();
    } catch(e) { showGenerator(); }
  } else { showGenerator(); }
}
init();
</script>
</body>
</html>
