<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notion Vault</title>
  <style>
    :root { --bg: #121212; --accent: #c4a882; --border: #333; --text: #eee; --radius: 6px; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; margin: 0; display: flex; align-items: center; height: 100vh; overflow: hidden; }
    #app { width: 100%; }
    .row { display: flex; width: 100%; padding: 0 10px; gap: 8px; align-items: center; box-sizing: border-box; }
    .column { display: flex; flex-direction: column; width: 100%; padding: 10px; gap: 10px; box-sizing: border-box; }
    input, textarea, select { background: #1e1e1e; border: 1px solid var(--border); color: #fff; padding: 8px; border-radius: var(--radius); font-size: 12px; outline: none; font-family: inherit; box-sizing: border-box; }
    input { width: 100%; }
    textarea { height: 60px; resize: none; width: 100%; }
    button { background: var(--accent); border: none; padding: 8px 15px; border-radius: var(--radius); cursor: pointer; font-weight: bold; font-size: 10px; text-transform: uppercase; white-space: nowrap; color: #000; }
    button:hover { opacity: 0.8; }
    .label { color: var(--accent); font-weight: bold; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px; }
    .item-row { display: flex; align-items: center; background: #000; padding: 5px 10px; border-radius: 4px; border: 1px solid var(--border); margin-bottom: 4px; gap: 8px; }
    #out-box { background: #000; border: 1px dashed var(--accent); color: var(--accent); padding: 12px; font-size: 11px; text-align: center; cursor: pointer; border-radius: var(--radius); width: 100%; box-sizing: border-box; }
    .scroll { max-height: 150px; overflow-y: auto; }
  </style>
</head>
<body>
  <div id="app">Loading...</div>

<script>
'use strict';
const E = new TextEncoder(), D = new TextDecoder();

// Simple, robust Base64 helpers
const toB64 = (str) => btoa(unescape(encodeURIComponent(str))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
const fromB64 = (str) => decodeURIComponent(escape(atob(str.replace(/-/g, '+').replace(/_/g, '/'))));

async function deriveKey(pass, salt) {
  const base = await crypto.subtle.importKey('raw', E.encode(pass), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({ name: 'PBKDF2', salt, iterations: 310000, hash: 'SHA-256' }, base, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']);
}

function showGenerator() {
  document.getElementById('app').innerHTML = `
    <div class="column">
      <div style="display:flex; justify-content: space-between;">
        <span class="label">CREATOR</span>
        <select id="type" style="font-size:9px;"><option value="single">Single</option><option value="vault">Vault</option></select>
      </div>
      <input id="name" placeholder="Name (e.g. WiFi)">
      <div id="input-area"><input id="val" placeholder="Secret"></div>
      <input id="pass" type="password" placeholder="Passphrase">
      <button onclick="generate()">Generate & Copy Link</button>
    </div>
  `;
  document.getElementById('type').onchange = (e) => {
    document.getElementById('input-area').innerHTML = e.target.value === 'single' 
      ? '<input id="val" placeholder="Secret">' 
      : '<textarea id="val" placeholder="Label: Secret (one per line)"></textarea>';
  };
}

async function generate() {
  const n = document.getElementById('name').value, v = document.getElementById('val').value, p = document.getElementById('pass').value, t = document.getElementById('type').value;
  if(!n || !v || !p) return alert("Fill all fields");

  const salt = crypto.getRandomValues(new Uint8Array(16)), iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await deriveKey(p, salt);
  
  const payload = t === 'single' ? {n, v} : {n, items: v.split('\n').filter(l=>l.trim()).map(l => {
    const parts = l.split(':');
    return parts.length > 1 ? {l: parts[0].trim(), v: parts.slice(1).join(':').trim()} : {l: l.trim(), v: l.trim()};
  })};

  const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, E.encode(JSON.stringify(payload)));
  const blob = new Uint8Array(28 + ct.byteLength);
  blob.set(salt, 0); blob.set(iv, 16); blob.set(new Uint8Array(ct), 28);

  const b64Data = btoa(String.fromCharCode(...blob)).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  const url = window.location.href.split('#')[0] + '#' + toB64(n) + '.' + b64Data;
  
  await navigator.clipboard.writeText(url);
  document.getElementById('app').innerHTML = `<div class="column"><div id="out-box" onclick="window.location.reload()">COPIED! Now paste into Notion /embed.<br><small>(Click to reset)</small></div></div>`;
}

async function unlock() {
  const p = document.getElementById('up').value, h = location.hash.slice(1).split('.');
  try {
    const blob = Uint8Array.from(atob(h[1].replace(/-/g, '+').replace(/_/g, '/')), c => c.charCodeAt(0));
    const key = await deriveKey(p, blob.slice(0, 16));
    const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: blob.slice(16, 28) }, key, blob.slice(28));
    const data = JSON.parse(D.decode(pt));
    
    let html = `<div class="column"><div style="display:flex; justify-content:space-between"><span class="label">${data.n}</span><button onclick="location.reload()" style="background:#444; color:#fff; padding:2px 8px">Lock</button></div>`;
    
    if(data.items) {
      html += `<div class="scroll">` + data.items.map(i => `
        <div class="item-row">
          <span class="label" style="font-size:10px; width:60px">${i.l}</span>
          <input type="password" value="${i.v}" readonly style="flex:1" onclick="this.type='text'" onblur="this.type='password'">
          <button onclick="navigator.clipboard.writeText('${i.v}')" style="padding:4px">Copy</button>
        </div>`).join('') + `</div>`;
    } else {
      html += `<div class="row" style="padding:0"><input type="password" value="${data.v}" readonly id="res" onclick="this.type='text'" onblur="this.type='password'"><button onclick="navigator.clipboard.writeText(document.getElementById('res').value)">Copy</button></div>`;
    }
    document.getElementById('app').innerHTML = html + `</div>`;
  } catch(e) { alert("Wrong Passphrase"); }
}

function init() {
  const h = location.hash.slice(1);
  if(h && h.includes('.')) {
    try {
      const name = fromB64(h.split('.')[0]);
      document.getElementById('app').innerHTML = `
        <div class="row">
          <span class="label">${name}:</span>
          <input type="password" id="up" placeholder="Passphrase" onkeydown="if(event.key==='Enter') unlock()">
          <button onclick="unlock()">Unlock</button>
        </div>`;
    } catch(e) { showGenerator(); }
  } else { showGenerator(); }
}
init();
</script>
</body>
</html>
