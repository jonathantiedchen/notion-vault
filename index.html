<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notion Vault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500&family=Anybody:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0e0e0f;
      --surface:   #161618;
      --border:    #2a2a2e;
      --border-hi: #3d3d44;
      --text:      #e8e8e6;
      --muted:     #6b6b72;
      --accent:    #c8b8a2;
      --accent-hi: #e8d8c2;
      --danger:    #e05a5a;
      --success:   #5acea0;
      --radius:    10px;
      --mono:      'Geist Mono', monospace;
      --serif:     'Anybody', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.6;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 32px 16px 48px;
      min-height: 100%;
    }

    /* ─── Header ─── */
    header {
      width: 100%;
      max-width: 480px;
      margin-bottom: 28px;
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    header h1 {
      font-family: var(--serif);
      font-size: 22px;
      font-weight: 400;
      color: var(--accent-hi);
      letter-spacing: 0.02em;
    }

    header span {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ─── Card ─── */
    .card {
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ─── Mode toggle ─── */
    .mode-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 3px;
      gap: 3px;
    }

    .mode-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      padding: 8px 0;
      border-radius: 5px;
      transition: all 0.18s ease;
      letter-spacing: 0.04em;
    }

    .mode-btn.active {
      background: var(--surface);
      color: var(--accent-hi);
      border: 1px solid var(--border-hi);
    }

    .mode-btn:hover:not(.active) { color: var(--text); }

    /* ─── Fields ─── */
    label {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .label-text {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    input, textarea {
      font-family: var(--mono);
      font-size: 13px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      padding: 10px 12px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s ease;
      resize: none;
    }

    input:focus, textarea:focus { border-color: var(--border-hi); }
    input[type="password"] { letter-spacing: 0.15em; }

    textarea { min-height: 110px; line-height: 1.7; }

    /* ─── Strength bar ─── */
    .strength-wrap {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .strength-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
    }

    .strength-seg {
      height: 3px;
      border-radius: 2px;
      background: var(--border);
      transition: background 0.25s ease;
    }

    .strength-label {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    /* ─── Button ─── */
    .btn {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.06em;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      padding: 11px 20px;
      transition: all 0.18s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: var(--accent);
      color: #0e0e0f;
      font-weight: 500;
    }

    .btn-primary:hover { background: var(--accent-hi); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    /* ─── Result ─── */
    .result-box {
      display: none;
      flex-direction: column;
      gap: 12px;
      animation: fadeUp 0.25s ease forwards;
    }

    .result-box.visible { display: flex; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .result-label {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    .copy-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
      cursor: pointer;
      padding: 4px 10px;
      transition: all 0.15s ease;
      letter-spacing: 0.04em;
    }

    .copy-btn:hover { border-color: var(--border-hi); color: var(--text); }
    .copy-btn.copied { color: var(--success); border-color: var(--success); }

    .result-text {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 12px;
      word-break: break-all;
      color: var(--accent);
      font-size: 12px;
      line-height: 1.75;
      max-height: 160px;
      overflow-y: auto;
    }

    /* ─── Status message ─── */
    .status {
      font-size: 12px;
      padding: 10px 12px;
      border-radius: 7px;
      display: none;
    }

    .status.error {
      display: block;
      background: rgba(224, 90, 90, 0.08);
      border: 1px solid rgba(224, 90, 90, 0.25);
      color: var(--danger);
    }

    .status.success {
      display: block;
      background: rgba(90, 206, 160, 0.08);
      border: 1px solid rgba(90, 206, 160, 0.25);
      color: var(--success);
    }

    /* ─── Footer ─── */
    footer {
      margin-top: 20px;
      max-width: 480px;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    footer p {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--success);
      margin-right: 6px;
      vertical-align: middle;
      box-shadow: 0 0 6px var(--success);
    }

    /* ─── Divider ─── */
    .divider {
      height: 1px;
      background: var(--border);
      width: 100%;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }
  </style>
</head>
<body>

  <header>
    <h1>notion vault</h1>
    <span>AES-256-GCM · local only</span>
  </header>

  <div class="card">

    <!-- Mode toggle -->
    <div class="mode-toggle">
      <button class="mode-btn active" id="btn-encrypt" onclick="setMode('encrypt')">⇡ encrypt</button>
      <button class="mode-btn"        id="btn-decrypt" onclick="setMode('decrypt')">⇣ decrypt</button>
    </div>

    <!-- Passphrase -->
    <label>
      <span class="label-text">Passphrase</span>
      <input type="password" id="passphrase" placeholder="Enter passphrase…" oninput="updateStrength()" autocomplete="off" />
      <div class="strength-wrap" id="strength-wrap">
        <div class="strength-bar">
          <div class="strength-seg" id="s1"></div>
          <div class="strength-seg" id="s2"></div>
          <div class="strength-seg" id="s3"></div>
          <div class="strength-seg" id="s4"></div>
        </div>
        <span class="strength-label" id="strength-label"></span>
      </div>
    </label>

    <div class="divider"></div>

    <!-- Input text -->
    <label>
      <span class="label-text" id="input-label">Plaintext</span>
      <textarea id="input-text" placeholder="Type the secret to encrypt…"></textarea>
    </label>

    <!-- Action button -->
    <button class="btn btn-primary" onclick="run()">
      <span id="btn-label">Encrypt</span>
    </button>

    <!-- Status -->
    <div class="status" id="status"></div>

    <!-- Result -->
    <div class="result-box" id="result-box">
      <div class="result-header">
        <span class="result-label" id="result-label">Encrypted</span>
        <button class="copy-btn" id="copy-btn" onclick="copyResult()">copy</button>
      </div>
      <div class="result-text" id="result-text"></div>
    </div>

  </div>

  <footer>
    <p><span class="dot"></span>runs entirely in your browser</p>
    <p>notion-vault</p>
  </footer>

<script>
  // ─── State ───────────────────────────────────────────────
  let mode = 'encrypt';

  function setMode(m) {
    mode = m;
    document.getElementById('btn-encrypt').classList.toggle('active', m === 'encrypt');
    document.getElementById('btn-decrypt').classList.toggle('active', m === 'decrypt');
    document.getElementById('input-label').textContent  = m === 'encrypt' ? 'Plaintext'  : 'Ciphertext';
    document.getElementById('btn-label').textContent    = m === 'encrypt' ? 'Encrypt'    : 'Decrypt';
    document.getElementById('result-label').textContent = m === 'encrypt' ? 'Encrypted'  : 'Decrypted';
    document.getElementById('input-text').placeholder   = m === 'encrypt'
      ? 'Type the secret to encrypt…'
      : 'Paste the encrypted string…';
    document.getElementById('strength-wrap').style.display = m === 'encrypt' ? '' : 'none';
    hide('result-box');
    hide('status');
    document.getElementById('input-text').value = '';
    document.getElementById('passphrase').value = '';
    updateStrength();
  }

  // ─── Strength meter ───────────────────────────────────────
  function updateStrength() {
    if (mode !== 'encrypt') return;
    const pw = document.getElementById('passphrase').value;
    const segs = [document.getElementById('s1'), document.getElementById('s2'),
                  document.getElementById('s3'), document.getElementById('s4')];
    const lbl  = document.getElementById('strength-label');
    let score = 0;
    if (pw.length >= 8)  score++;
    if (pw.length >= 14) score++;
    if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
    if (/[0-9!@#$%^&*]/.test(pw)) score++;
    const colors = ['#e05a5a','#e07a3a','#d4b85a','#5acea0'];
    const labels = ['','weak','fair','good','strong'];
    segs.forEach((s, i) => s.style.background = i < score ? colors[score - 1] : 'var(--border)');
    lbl.textContent = pw.length ? labels[score] : '';
  }

  // ─── Crypto helpers ───────────────────────────────────────
  async function deriveKey(passphrase, salt) {
    const enc  = new TextEncoder();
    const base = await crypto.subtle.importKey('raw', enc.encode(passphrase), 'PBKDF2', false, ['deriveKey']);
    return crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt, iterations: 310_000, hash: 'SHA-256' },
      base,
      { name: 'AES-GCM', length: 256 },
      false, ['encrypt', 'decrypt']
    );
  }

  function bufToB64(buf) {
    return btoa(String.fromCharCode(...new Uint8Array(buf)));
  }

  function b64ToBuf(b64) {
    return Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  }

  async function encryptText(plaintext, passphrase) {
    const enc  = new TextEncoder();
    const salt = crypto.getRandomValues(new Uint8Array(16));
    const iv   = crypto.getRandomValues(new Uint8Array(12));
    const key  = await deriveKey(passphrase, salt);
    const ct   = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc.encode(plaintext));
    // Pack: salt(16) + iv(12) + ciphertext — all base64
    const packed = new Uint8Array(16 + 12 + ct.byteLength);
    packed.set(salt, 0);
    packed.set(iv,   16);
    packed.set(new Uint8Array(ct), 28);
    return 'vault:v1:' + bufToB64(packed.buffer);
  }

  async function decryptText(payload, passphrase) {
    if (!payload.startsWith('vault:v1:')) throw new Error('Not a valid vault ciphertext.');
    const packed = b64ToBuf(payload.slice('vault:v1:'.length));
    const salt   = packed.slice(0, 16);
    const iv     = packed.slice(16, 28);
    const ct     = packed.slice(28);
    const key    = await deriveKey(passphrase, salt);
    const pt     = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
    return new TextDecoder().decode(pt);
  }

  // ─── UI helpers ───────────────────────────────────────────
  function show(id) { document.getElementById(id).style.display = 'flex'; }
  function hide(id) {
    const el = document.getElementById(id);
    el.style.display = 'none';
    el.classList.remove('visible','error','success');
  }

  function showStatus(msg, type) {
    const el = document.getElementById('status');
    el.style.display = 'block';
    el.className = 'status ' + type;
    el.textContent = msg;
  }

  // ─── Main action ─────────────────────────────────────────
  async function run() {
    hide('status');
    hide('result-box');
    const passphrase = document.getElementById('passphrase').value.trim();
    const input      = document.getElementById('input-text').value.trim();

    if (!passphrase) { showStatus('Passphrase is required.', 'error'); return; }
    if (!input)      { showStatus('Nothing to ' + mode + '.', 'error'); return; }

    try {
      let result;
      if (mode === 'encrypt') {
        result = await encryptText(input, passphrase);
      } else {
        result = await decryptText(input, passphrase);
      }
      document.getElementById('result-text').textContent = result;
      const rb = document.getElementById('result-box');
      rb.style.display = 'flex';
      rb.classList.add('visible');
    } catch (e) {
      const msg = mode === 'decrypt'
        ? 'Decryption failed — wrong passphrase or corrupted data.'
        : 'Encryption failed: ' + e.message;
      showStatus(msg, 'error');
    }
  }

  // ─── Copy ─────────────────────────────────────────────────
  function copyResult() {
    const text = document.getElementById('result-text').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = 'copied ✓';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 1800);
    });
  }

  // ─── Allow Enter to submit ────────────────────────────────
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') run();
  });
</script>
</body>
</html>
