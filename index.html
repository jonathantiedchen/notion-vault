<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notion Vault | Private Encryption</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --card-bg: #141414;
      --accent: #c4a882;
      --text-main: #ffffff;
      --text-dim: #a0a0a0;
      --border: rgba(255, 255, 255, 0.08);
      --input-bg: #000000;
      --width: 460px; /* Fixed width for perfect vertical alignment */
    }

    * { box-sizing: border-box; }

    body {
      background-color: var(--bg);
      background-image: radial-gradient(circle at 50% -20%, #1a1a1a 0%, var(--bg) 80%);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
      margin: 0;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Master Wrapper to keep everything perfectly centered */
    .stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: var(--width);
      padding: 60px 0;
    }

    header { text-align: center; margin-bottom: 40px; width: 100%; }
    header h1 { font-size: 32px; font-weight: 700; letter-spacing: -1px; margin: 0; }
    header p { color: var(--text-dim); font-size: 15px; margin-top: 10px; }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      margin-bottom: 30px;
    }

    /* --- FORM ELEMENTS --- */
    .field { margin-bottom: 24px; }
    .label { 
      display: block; 
      font-size: 11px; 
      font-weight: 700; 
      color: var(--accent); 
      text-transform: uppercase; 
      letter-spacing: 1.5px; 
      margin-bottom: 10px; 
    }

    input, textarea, select {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      color: white;
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
    }

    input:focus { border-color: var(--accent); }

    button {
      width: 100%;
      background: var(--accent);
      color: #000;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: transform 0.1s;
    }

    button:active { transform: scale(0.98); }
    .btn-secondary { background: transparent; color: var(--text-dim); border: 1px solid var(--border); margin-top: 15px; }

    /* Result View Link Box */
    .link-box {
      display: flex;
      gap: 8px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      padding: 4px;
      border-radius: 8px;
      margin-bottom: 10px;
    }
    .link-box input { border: none; background: transparent; flex-grow: 1; font-family: monospace; font-size: 12px; color: var(--accent); }
    .link-box button { width: auto; padding: 8px 16px; font-size: 12px; }

    /* --- FOOTER & CENTERING FIX --- */
    .divider { width: 100%; height: 1px; background: var(--border); margin-bottom: 24px; }
    footer { text-align: center; color: var(--text-dim); font-size: 13px; line-height: 1.6; }

    .badge {
      display: inline-block;
      background: rgba(196, 168, 130, 0.1);
      color: var(--accent);
      padding: 4px 12px;
      border-radius: 100px;
      font-weight: 600;
      font-size: 11px;
      margin-bottom: 16px;
    }

    /* Notion Row View (Optimized for Embeds) */
    .notion-view {
      display: flex;
      align-items: center;
      width: 100vw;
      height: 100vh;
      padding: 0 16px;
      gap: 12px;
    }
    .vault-tag { color: var(--accent); font-weight: 700; font-size: 14px; white-space: nowrap; }
  </style>
</head>
<body>

<div id="app"></div>

<script>
'use strict';
const E = new TextEncoder(), D = new TextDecoder();
const toB64 = (str) => btoa(unescape(encodeURIComponent(str))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
const fromB64 = (str) => decodeURIComponent(escape(atob(str.replace(/-/g, '+').replace(/_/g, '/'))));

async function deriveKey(pass, salt) {
  const base = await crypto.subtle.importKey('raw', E.encode(pass), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({ name: 'PBKDF2', salt, iterations: 310000, hash: 'SHA-256' }, base, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']);
}

function showGenerator() {
  document.getElementById('app').innerHTML = `
    <div class="stack">
      <header>
        <div class="badge">🛡️ Zero-Knowledge</div>
        <h1>Notion Vault</h1>
        <p>Mathematical privacy for your secrets.</p>
      </header>

      <div class="card">
        <div class="field">
          <label class="label">Configuration</label>
          <select id="type">
            <option value="single">Single Secret</option>
            <option value="vault">Multi-Item Vault</option>
          </select>
        </div>
        <div class="field">
          <label class="label">Title</label>
          <input id="name" placeholder="e.g. Git Password">
        </div>
        <div class="field" id="input-area">
          <label class="label">Secret Data</label>
          <input id="val" placeholder="Paste sensitive text...">
        </div>
        <div class="field">
          <label class="label">Passphrase</label>
          <input id="pass" type="password" placeholder="Don't lose this key">
        </div>
        <button onclick="generate()">Generate Secure Link</button>
      </div>

      <div class="divider"></div>
      <footer>
        All encryption happens locally in your browser.<br>
        <a href="https://github.com/jonathantiedchen/notion-vault" style="color:var(--accent); text-decoration:none;">View Source on GitHub</a>
      </footer>
    </div>
  `;

  document.getElementById('type').onchange = (e) => {
    document.getElementById('input-area').innerHTML = e.target.value === 'single' 
      ? '<label class="label">Secret Data</label><input id="val" placeholder="Paste sensitive text...">' 
      : '<label class="label">Vault Items</label><textarea id="val" rows="3" placeholder="Label: Secret (One per line)"></textarea>';
  };
}

async function generate() {
  const n = document.getElementById('name').value, v = document.getElementById('val').value, p = document.getElementById('pass').value, t = document.getElementById('type').value;
  if(!n || !v || !p) return alert("Fill all fields.");

  const salt = crypto.getRandomValues(new Uint8Array(16)), iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await deriveKey(p, salt);
  const payload = t === 'single' ? {n, v} : {n, items: v.split('\n').filter(l=>l.trim()).map(l => {
    const parts = l.split(':');
    return parts.length > 1 ? {l: parts[0].trim(), v: parts.slice(1).join(':').trim()} : {l: l.trim(), v: l.trim()};
  })};

  const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, E.encode(JSON.stringify(payload)));
  const blob = new Uint8Array(28 + ct.byteLength);
  blob.set(salt, 0); blob.set(iv, 16); blob.set(new Uint8Array(ct), 28);
  const b64Data = btoa(String.fromCharCode(...blob)).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  const url = window.location.href.split('#')[0] + '#' + toB64(n) + '.' + b64Data;
  
  await navigator.clipboard.writeText(url);

  document.getElementById('app').innerHTML = `
    <div class="stack">
      <header>
        <div class="badge">Success</div>
        <h1>Link Ready</h1>
        <p>Copied to clipboard! Embed it into Notion.</p>
      </header>
      <div class="card">
        <div class="label">Your Encrypted Link</div>
        <div class="link-box">
          <input type="text" id="final-url" value="${url}" readonly>
          <button onclick="copyBtn()">Copy</button>
        </div>
        <button onclick="window.location.reload()" class="btn-secondary">Create Another</button>
      </div>
    </div>
  `;
}

function copyBtn() {
  const el = document.getElementById('final-url');
  el.select();
  navigator.clipboard.writeText(el.value);
  alert("Link Copied!");
}

async function unlock() {
  const p = document.getElementById('up').value, h = location.hash.slice(1).split('.');
  try {
    const blob = Uint8Array.from(atob(h[1].replace(/-/g, '+').replace(/_/g, '/')), c => c.charCodeAt(0));
    const key = await deriveKey(p, blob.slice(0, 16));
    const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: blob.slice(16, 28) }, key, blob.slice(28));
    const data = JSON.parse(D.decode(pt));
    
    document.body.style.backgroundImage = 'none';
    if(data.items) {
      let html = `<div style="width:100%; height:100vh; display:flex; flex-direction:column; background:#000;">
        <div style="padding:12px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center;">
          <span class="vault-tag">${data.n}</span>
          <div style="flex-grow:1"></div>
          <button onclick="location.reload()" style="width:auto; padding:6px 12px;" class="btn-secondary">Lock</button>
        </div>
        <div style="flex-grow:1; overflow-y:auto; padding:12px;">`;
      html += data.items.map(i => `
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px; background:var(--card-bg); padding:8px; border-radius:8px; border:1px solid var(--border);">
          <span style="font-size:11px; color:var(--text-dim); width:70px; overflow:hidden; text-overflow:ellipsis;">${i.l}</span>
          <input style="flex-grow:1; background:transparent; border:none; padding:0;" type="password" value="${i.v}" readonly onclick="this.type='text'" onblur="this.type='password'">
          <button onclick="navigator.clipboard.writeText('${i.v}')" style="width:auto; padding:4px 8px; font-size:10px;">Copy</button>
        </div>`).join('') + `</div></div>`;
      document.getElementById('app').innerHTML = html;
    } else {
      document.getElementById('app').innerHTML = `
        <div class="notion-view">
          <span class="vault-tag">${data.n}</span>
          <input style="flex-grow:1; background:transparent; border:none;" type="password" value="${data.v}" readonly onclick="this.type='text'" onblur="this.type='password'">
          <button onclick="navigator.clipboard.writeText('${data.v}')" style="width:auto; padding:8px 12px;">Copy</button>
        </div>`;
    }
  } catch(e) { alert("Incorrect Passphrase"); }
}

function init() {
  const h = location.hash.slice(1);
  if(h && h.includes('.')) {
    try {
      const name = fromB64(h.split('.')[0]);
      document.body.style.backgroundImage = 'none';
      document.getElementById('app').innerHTML = `
        <div class="notion-view">
          <span class="vault-tag">${name}</span>
          <input style="flex-grow:1; background:var(--input-bg); border-radius:8px; border:1px solid var(--border); padding:8px;" id="up" type="password" placeholder="Passphrase" onkeydown="if(event.key==='Enter') unlock()">
          <button onclick="unlock()" style="width:auto; padding:8px 16px;">Unlock</button>
        </div>`;
      document.getElementById('up').focus();
    } catch(e) { showGenerator(); }
  } else { showGenerator(); }
}
init();
</script>
</body>
</html>
