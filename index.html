<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notion Vault</title>
  <style>
    /* Super simple, robust dark theme */
    body { 
      background: #121212; 
      color: #eee; 
      font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
      margin: 0; 
      display: flex; 
      justify-content: center;
      align-items: center; 
      height: 100vh; 
      overflow: hidden;
    }

    #app { width: 100%; max-width: 450px; padding: 15px; box-sizing: border-box; }

    .box { background: #1e1e1e; padding: 25px; border-radius: 8px; border: 1px solid #333; }
    
    .field { margin-bottom: 15px; }
    .field label { display: block; font-size: 11px; font-weight: bold; color: #c4a882; margin-bottom: 5px; text-transform: uppercase; }

    /* Bulletproof row: Label and Button NEVER shrink, Input shrinks */
    .row { display: flex; width: 100%; gap: 10px; align-items: center; box-sizing: border-box; }
    
    .vault-label { 
      color: #c4a882; 
      font-weight: bold; 
      font-size: 14px; 
      white-space: nowrap; 
      flex-shrink: 0; /* This prevents the "g..." cutoff completely */
    }

    input, textarea, select { 
      background: #000; 
      border: 1px solid #444; 
      color: #fff; 
      padding: 10px; 
      border-radius: 6px; 
      font-size: 14px; 
      outline: none; 
      width: 100%;
      box-sizing: border-box;
    }

    .flex-input { 
      flex-grow: 1; 
      min-width: 0; /* This forces the input to shrink instead of the text */
    }

    textarea { height: 80px; resize: none; }

    button { 
      background: #c4a882; 
      border: none; 
      padding: 10px 15px; 
      border-radius: 6px; 
      cursor: pointer; 
      font-weight: bold; 
      color: #000; 
      white-space: nowrap; 
      flex-shrink: 0; /* Button never shrinks */
    }

    button.full { width: 100%; margin-top: 10px; }
    button.secondary { background: #333; color: #fff; }

    .scroll-area { max-height: 200px; overflow-y: auto; margin-top: 15px; padding-right: 5px; }
    .item-row { display: flex; align-items: center; background: #000; padding: 8px; border-radius: 6px; border: 1px solid #333; margin-bottom: 8px; gap: 10px; }
    .item-label { font-size: 12px; color: #aaa; width: 70px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
  </style>
</head>
<body>
  <div id="app"></div>

<script>
'use strict';
const E = new TextEncoder(), D = new TextDecoder();
const toB64 = (str) => btoa(unescape(encodeURIComponent(str))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
const fromB64 = (str) => decodeURIComponent(escape(atob(str.replace(/-/g, '+').replace(/_/g, '/'))));

async function deriveKey(pass, salt) {
  const base = await crypto.subtle.importKey('raw', E.encode(pass), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({ name: 'PBKDF2', salt, iterations: 310000, hash: 'SHA-256' }, base, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']);
}

// --- 1. GENERATOR SCREEN ---
function showGenerator() {
  document.getElementById('app').innerHTML = `
    <div class="box">
      <h2 style="color: #c4a882; margin: 0 0 20px 0; text-align: center;">Vault Creator</h2>
      
      <div class="field">
        <label>Type</label>
        <select id="type">
          <option value="single">Single Secret</option>
          <option value="vault">Multi-Vault (List)</option>
        </select>
      </div>

      <div class="field">
        <label>Display Name</label>
        <input id="name" placeholder="e.g. Git Password">
      </div>

      <div class="field" id="input-area">
        <label>Secret Content</label>
        <input id="val" placeholder="Paste sensitive data here...">
      </div>

      <div class="field">
        <label>Master Passphrase</label>
        <input id="pass" type="password" placeholder="Don't forget this!">
      </div>

      <button class="full" onclick="generate()">Encrypt & Create Link</button>
    </div>
  `;

  document.getElementById('type').onchange = (e) => {
    document.getElementById('input-area').innerHTML = e.target.value === 'single' 
      ? '<label>Secret Content</label><input id="val" placeholder="Paste sensitive data here...">' 
      : '<label>Vault Items</label><textarea id="val" placeholder="Label: Secret&#10;User: Admin&#10;(One per line)"></textarea>';
  };
}

// --- 2. GENERATION & LINK DISPLAY ---
async function generate() {
  const n = document.getElementById('name').value, v = document.getElementById('val').value, p = document.getElementById('pass').value, t = document.getElementById('type').value;
  if(!n || !v || !p) return alert("Fill all fields.");

  const salt = crypto.getRandomValues(new Uint8Array(16)), iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await deriveKey(p, salt);
  
  const payload = t === 'single' ? {n, v} : {n, items: v.split('\n').filter(l=>l.trim()).map(l => {
    const parts = l.split(':');
    return parts.length > 1 ? {l: parts[0].trim(), v: parts.slice(1).join(':').trim()} : {l: l.trim(), v: l.trim()};
  })};

  const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, E.encode(JSON.stringify(payload)));
  const blob = new Uint8Array(28 + ct.byteLength);
  blob.set(salt, 0); blob.set(iv, 16); blob.set(new Uint8Array(ct), 28);

  const b64Data = btoa(String.fromCharCode(...blob)).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  const url = window.location.href.split('#')[0] + '#' + toB64(n) + '.' + b64Data;
  
  // Auto-copy to clipboard
  try { await navigator.clipboard.writeText(url); } catch(err) { console.log("Auto-copy failed", err); }

  // Display the link with a copy button
  document.getElementById('app').innerHTML = `
    <div class="box" style="text-align: center;">
      <h2 style="color: #c4a882; margin-top: 0;">✅ Link Ready!</h2>
      <p style="font-size: 13px; color: #aaa; margin-bottom: 20px;">The secure link has been automatically copied to your clipboard. Paste it into Notion using <strong>/embed</strong>.</p>
      
      <div class="row" style="margin-bottom: 20px;">
        <input type="text" id="link-display" value="${url}" readonly class="flex-input" onclick="this.select()">
        <button id="copy-btn" onclick="copyLinkBtn()">Copy</button>
      </div>

      <button class="full secondary" onclick="window.location.reload()">Create Another Vault</button>
    </div>
  `;
}

function copyLinkBtn() {
  const linkInput = document.getElementById('link-display');
  linkInput.select();
  navigator.clipboard.writeText(linkInput.value);
  const btn = document.getElementById('copy-btn');
  btn.innerText = 'Copied!';
  setTimeout(() => btn.innerText = 'Copy', 2000);
}

// --- 3. NOTION UNLOCK VIEW ---
async function unlock() {
  const p = document.getElementById('up').value, h = location.hash.slice(1).split('.');
  try {
    const blob = Uint8Array.from(atob(h[1].replace(/-/g, '+').replace(/_/g, '/')), c => c.charCodeAt(0));
    const key = await deriveKey(p, blob.slice(0, 16));
    const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: blob.slice(16, 28) }, key, blob.slice(28));
    const data = JSON.parse(D.decode(pt));
    
    if(data.items) {
      let html = `<div style="width:100%;">
        <div class="row" style="border-bottom: 1px solid #333; padding-bottom: 10px;">
          <span class="vault-label">${data.n}</span>
          <div style="flex-grow:1"></div>
          <button class="secondary" onclick="location.reload()">Lock</button>
        </div>
        <div class="scroll-area">`;
      html += data.items.map(i => `
        <div class="item-row">
          <span class="item-label">${i.l}</span>
          <input class="flex-input" type="password" value="${i.v}" readonly onclick="this.type='text'" onblur="this.type='password'" style="background:transparent; border:none; padding:0;">
          <button onclick="copyVal('${i.v.replace(/'/g, "\\'")}', this)" style="padding: 5px 10px; font-size: 11px;">Copy</button>
        </div>`).join('') + `</div></div>`;
      document.getElementById('app').innerHTML = html;
    } else {
      document.getElementById('app').innerHTML = `
        <div class="row">
          <span class="vault-label">${data.n}</span>
          <input class="flex-input" type="password" value="${data.v}" readonly id="res" onclick="this.type='text'" onblur="this.type='password'">
          <button onclick="copyVal(document.getElementById('res').value, this)">Copy</button>
          <button class="secondary" onclick="location.reload()">Lock</button>
        </div>`;
    }
  } catch(e) { alert("Wrong Passphrase"); }
}

function copyVal(t, b) { navigator.clipboard.writeText(t); b.innerText = 'OK'; setTimeout(() => b.innerText = 'Copy', 1000); }

function init() {
  const h = location.hash.slice(1);
  if(h && h.includes('.')) {
    try {
      const name = fromB64(h.split('.')[0]);
      document.getElementById('app').innerHTML = `
        <div class="row">
          <span class="vault-label">${name}</span>
          <input class="flex-input" id="up" type="password" placeholder="Passphrase" onkeydown="if(event.key==='Enter') unlock()">
          <button onclick="unlock()">Unlock</button>
        </div>`;
      document.getElementById('up').focus();
    } catch(e) { showGenerator(); }
  } else { showGenerator(); }
}

init();
</script>
</body>
</html>
