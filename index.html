<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notion Vault - In-Place</title>
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0c0c0d; --surface: #141415; --border: #252528; --text: #e4e4e0;
      --muted: #5a5a62; --accent: #c4a882; --success: #52b788; --radius: 6px;
      --mono: 'Geist Mono', monospace;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 13px; overflow: hidden; }

    /* Layout Container */
    .vault-row {
      display: flex; align-items: center; width: 100%; height: 42px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 0 10px; gap: 10px;
    }

    /* Views */
    .view { display: none; align-items: center; width: 100%; gap: 10px; }
    .active { display: flex; }

    /* Inputs */
    input {
      background: transparent; border: none; color: var(--text);
      font-family: var(--mono); font-size: 12px; outline: none; width: 100%;
    }
    input::placeholder { color: var(--muted); }

    /* Buttons */
    .btn {
      background: none; border: 1px solid var(--border); border-radius: 4px;
      color: var(--muted); font-size: 10px; padding: 4px 8px;
      cursor: pointer; text-transform: uppercase; white-space: nowrap;
    }
    .btn:hover { border-color: var(--accent); color: var(--text); }
    .btn-primary { background: var(--accent); color: #000; border: none; font-weight: 600; }

    .label-tag { color: var(--accent); font-weight: 500; min-width: fit-content; }
    .divider { width: 1px; height: 16px; background: var(--border); flex-shrink: 0; }
    .shake { animation: shake 0.3s ease; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
  </style>
</head>
<body>

<div class="vault-row">
  
  <div id="view-start" class="view">
    <button class="btn btn-primary" onclick="showView('view-create')">+ Setup Secret</button>
    <div class="divider"></div>
    <span style="color:var(--muted)">Empty Vault</span>
  </div>

  <div id="view-create" class="view">
    <button class="btn btn-primary" onclick="generateAndSwap()">Save</button>
    <button class="btn" onclick="showView('view-start')">✕</button>
    <div class="divider"></div>
    <input type="text" id="s-label" placeholder="Label" style="width:20%">
    <input type="text" id="s-secret" placeholder="Secret" style="width:30%">
    <input type="password" id="s-pass" placeholder="Passphrase">
  </div>

  <div id="view-replace" class="view">
    <button class="btn btn-primary" id="copy-replace-btn" onclick="copyAndFinish()">Copy & Replace Embed</button>
    <div class="divider"></div>
    <span style="color:var(--success); font-size:11px">Encrypted!</span>
    <input type="text" id="result-url" readonly style="color:var(--muted); font-size:10px; flex-grow:1">
  </div>

  <div id="view-locked" class="view">
    <button class="btn btn-primary" onclick="unlock()">Unlock</button>
    <div class="divider"></div>
    <span class="label-tag" id="disp-label-locked"></span>
    <input type="password" id="unlock-pass" placeholder="Passphrase..." onkeydown="if(event.key==='Enter') unlock()">
  </div>

  <div id="view-unlocked" class="view">
    <button class="btn" id="copy-btn" onclick="copySecret()">Copy</button>
    <button class="btn" onclick="lock()">Lock</button>
    <div class="divider"></div>
    <span class="label-tag" id="disp-label-unlocked"></span>
    <div id="disp-secret" style="flex-grow:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"></div>
  </div>

</div>

  <div id="view-unlocked" class="view">
    <span class="label-tag" id="disp-label-unlocked"></span>
    <div class="divider"></div>
    <div id="disp-secret" style="flex-grow:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"></div>
    <button class="btn" id="copy-btn" onclick="copySecret()">Copy</button>
    <button class="btn" onclick="lock()">Lock</button>
  </div>

</div>

<script>
const ENC = new TextEncoder();
const DEC = new TextDecoder();

// --- Crypto Helpers ---
function bufToB64(buf) { return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''); }
function b64ToBuf(b64) { 
  b64 = b64.replace(/-/g,'+').replace(/_/g,'/');
  while (b64.length % 4) b64 += '=';
  return Uint8Array.from(atob(b64), c => c.charCodeAt(0));
}
async function deriveKey(pass, salt) {
  const base = await crypto.subtle.importKey('raw', ENC.encode(pass), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({ name:'PBKDF2', salt, iterations:310000, hash:'SHA-256' }, base, { name:'AES-GCM', length:256 }, false, ['encrypt','decrypt']);
}
async function encrypt(plain, pass) {
  const salt = crypto.getRandomValues(new Uint8Array(16)), iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await deriveKey(pass, salt);
  const ct = await crypto.subtle.encrypt({ name:'AES-GCM', iv }, key, ENC.encode(plain));
  const out = new Uint8Array(28 + ct.byteLength);
  out.set(salt,0); out.set(iv,16); out.set(new Uint8Array(ct),28);
  return bufToB64(out.buffer);
}
async function decrypt(b64, pass) {
  const d = b64ToBuf(b64);
  const key = await deriveKey(pass, d.slice(0,16));
  const pt = await crypto.subtle.decrypt({ name:'AES-GCM', iv:d.slice(16,28) }, key, d.slice(28));
  return DEC.decode(pt);
}

// --- App Logic ---
let currentSecret = '';

function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

async function generateAndSwap() {
  const label = document.getElementById('s-label').value, secret = document.getElementById('s-secret').value, pass = document.getElementById('s-pass').value;
  if(!label || !secret || !pass) return;
  const encrypted = await encrypt(JSON.stringify({label, secret}), pass);
  const labelB64 = btoa(unescape(encodeURIComponent(label))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
  const finalUrl = `${window.location.origin}${window.location.pathname}#v1.${labelB64}.${encrypted}`;
  
  document.getElementById('result-url').value = finalUrl;
  showView('view-replace');
}

function copyAndFinish() {
  navigator.clipboard.writeText(document.getElementById('result-url').value);
  const btn = document.getElementById('copy-replace-btn');
  btn.textContent = "Copied! Now Paste over this block.";
  btn.style.background = "var(--success)";
}

async function unlock() {
  const hash = location.hash.slice(1), pass = document.getElementById('unlock-pass').value, parts = hash.split('.');
  try {
    const plain = await decrypt(parts[2], pass);
    const data = JSON.parse(plain);
    currentSecret = data.secret;
    document.getElementById('disp-secret').textContent = data.secret;
    showView('view-unlocked');
  } catch(e) {
    document.querySelector('.vault-row').classList.add('shake');
    setTimeout(() => document.querySelector('.vault-row').classList.remove('shake'), 300);
  }
}

function lock() {
  currentSecret = ''; document.getElementById('unlock-pass').value = '';
  showView('view-locked');
}

function copySecret() {
  navigator.clipboard.writeText(currentSecret);
  const btn = document.getElementById('copy-btn');
  btn.textContent = 'DONE'; setTimeout(() => btn.textContent = 'COPY', 1500);
}

function init() {
  const hash = location.hash.slice(1);
  if (hash.startsWith('v1.')) {
    const parts = hash.split('.');
    try {
      const label = decodeURIComponent(escape(atob(parts[1].replace(/-/g,'+').replace(/_/g,'/'))));
      document.getElementById('disp-label-locked').textContent = label;
      document.getElementById('disp-label-unlocked').textContent = label;
      showView('view-locked');
    } catch(e) { showView('view-start'); }
  } else {
    showView('view-start');
  }
}
init();
</script>
</body>
</html>
