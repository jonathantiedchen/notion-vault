<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notion Vault | Secure Generator</title>
  <style>
    :root { 
      --bg: #0f0f0f; 
      --card: #1a1a1a;
      --accent: #c4a882; 
      --border: #333; 
      --text: #eee; 
      --text-dim: #888;
      --radius: 10px; 
    }
    
    body { 
      background: var(--bg); 
      color: var(--text); 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
      margin: 0; 
      display: flex; 
      justify-content: center;
      align-items: center; 
      min-height: 100vh; 
    }

    #app { width: 100%; max-width: 450px; padding: 20px; box-sizing: border-box; }

    /* Polished Card Layout for the Generator */
    .generator-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .header { margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
    .header h1 { font-size: 18px; margin: 0; color: var(--accent); letter-spacing: 1px; }
    .header p { font-size: 12px; color: var(--text-dim); margin: 5px 0 0 0; }

    /* The "Notion Row" Look (for when it's embedded) */
    .notion-row { 
      display: flex; 
      width: 100%; 
      padding: 0 10px; 
      gap: 12px; 
      align-items: center; 
      box-sizing: border-box;
      background: #121212;
      height: 100vh; /* Fills the embed block */
    }

    .label { 
      color: var(--accent); 
      font-weight: 600; 
      font-size: 13px; 
      white-space: nowrap; 
      overflow: hidden; 
      text-overflow: ellipsis; 
      min-width: fit-content; 
      max-width: 140px; 
      flex-shrink: 0; 
    }

    .field-group { margin-bottom: 15px; }
    .field-label { display: block; font-size: 11px; font-weight: bold; color: var(--text-dim); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }

    input, textarea, select { 
      background: #252525; 
      border: 1px solid var(--border); 
      color: #fff; 
      padding: 10px 12px; 
      border-radius: var(--radius); 
      font-size: 14px; 
      outline: none; 
      font-family: inherit; 
      box-sizing: border-box; 
      width: 100%;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus { border-color: var(--accent); }

    textarea { height: 80px; resize: none; }

    button { 
      background: var(--accent); 
      border: none; 
      padding: 12px; 
      border-radius: var(--radius); 
      cursor: pointer; 
      font-weight: bold; 
      font-size: 12px; 
      text-transform: uppercase; 
      color: #000; 
      width: 100%;
      margin-top: 10px;
      transition: transform 0.1s, opacity 0.2s;
    }
    button:active { transform: scale(0.98); }
    button.secondary { background: #333; color: #fff; margin-top: 15px; }

    #out-box { 
      background: #000; 
      border: 2px dashed var(--accent); 
      color: var(--accent); 
      padding: 20px; 
      font-size: 13px; 
      text-align: center; 
      cursor: pointer; 
      border-radius: var(--radius); 
      margin-top: 10px;
      line-height: 1.5;
    }

    .scroll { max-height: 180px; overflow-y: auto; padding-right: 5px; }
    .item-row { 
      display: flex; 
      align-items: center; 
      background: #222; 
      padding: 8px 12px; 
      border-radius: 6px; 
      border: 1px solid var(--border); 
      margin-bottom: 6px; 
      gap: 10px; 
    }
    
    /* Responsive tweaks for narrow embeds */
    @media (max-height: 100px) {
      body { align-items: center; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div style="text-align: center; color: var(--accent);">Initializing...</div>
  </div>

<script>
'use strict';
const E = new TextEncoder(), D = new TextDecoder();

const toB64 = (str) => btoa(unescape(encodeURIComponent(str))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
const fromB64 = (str) => decodeURIComponent(escape(atob(str.replace(/-/g, '+').replace(/_/g, '/'))));

async function deriveKey(pass, salt) {
  const base = await crypto.subtle.importKey('raw', E.encode(pass), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({ name: 'PBKDF2', salt, iterations: 310000, hash: 'SHA-256' }, base, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']);
}

// ─── THE NEW PRETTY GENERATOR ───
function showGenerator() {
  document.getElementById('app').innerHTML = `
    <div class="generator-card">
      <div class="header">
        <h1>VAULT GENERATOR</h1>
        <p>Create an encrypted link for Notion</p>
      </div>
      
      <div class="field-group">
        <label class="field-label">Vault Type</label>
        <select id="type">
          <option value="single">Single Secret (Password, Key)</option>
          <option value="vault">Multi-Vault (List of items)</option>
        </select>
      </div>

      <div class="field-group">
        <label class="field-label">Display Name</label>
        <input id="name" placeholder="e.g. Netflix Login" autocomplete="off">
      </div>

      <div class="field-group">
        <label class="field-label">Secret Content</label>
        <div id="input-area"><input id="val" placeholder="Your secret here..."></div>
      </div>

      <div class="field-group">
        <label class="field-label">Master Passphrase</label>
        <input id="pass" type="password" placeholder="Don't forget this!">
      </div>

      <button onclick="generate()">Generate & Copy Link</button>
    </div>
  `;
  
  document.getElementById('type').onchange = (e) => {
    document.getElementById('input-area').innerHTML = e.target.value === 'single' 
      ? '<input id="val" placeholder="Your secret here...">' 
      : '<textarea id="val" placeholder="Name: Password&#10;Key: 12345&#10;(One per line)"></textarea>';
  };
}

async function generate() {
  const n = document.getElementById('name').value, v = document.getElementById('val').value, p = document.getElementById('pass').value, t = document.getElementById('type').value;
  if(!n || !v || !p) return alert("All fields are required.");

  const salt = crypto.getRandomValues(new Uint8Array(16)), iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await deriveKey(p, salt);
  
  const payload = t === 'single' ? {n, v} : {n, items: v.split('\n').filter(l=>l.trim()).map(l => {
    const parts = l.split(':');
    return parts.length > 1 ? {l: parts[0].trim(), v: parts.slice(1).join(':').trim()} : {l: l.trim(), v: l.trim()};
  })};

  const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, E.encode(JSON.stringify(payload)));
  const blob = new Uint8Array(28 + ct.byteLength);
  blob.set(salt, 0); blob.set(iv, 16); blob.set(new Uint8Array(ct), 28);

  const b64Data = btoa(String.fromCharCode(...blob)).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  const url = window.location.href.split('#')[0] + '#' + toB64(n) + '.' + b64Data;
  
  await navigator.clipboard.writeText(url);
  document.getElementById('app').innerHTML = `
    <div class="generator-card" style="text-align: center;">
      <div style="font-size: 40px; margin-bottom: 10px;">✅</div>
      <h2 style="color: var(--accent); margin: 0 0 10px 0;">LINK COPIED!</h2>
      <div id="out-box" onclick="navigator.clipboard.writeText('${url}')">
        <strong>Step 2:</strong> Go to Notion, type <strong>/embed</strong> and paste this link.<br>
        <small style="opacity: 0.7; display: block; margin-top: 10px;">(Click this box to re-copy if needed)</small>
      </div>
      <button class="secondary" onclick="window.location.reload()">Create Another</button>
    </div>
  `;
}

// ─── VAULT VIEW (Inside Notion) ───
async function unlock() {
  const p = document.getElementById('up').value, h = location.hash.slice(1).split('.');
  if (!p) return;

  try {
    const blob = Uint8Array.from(atob(h[1].replace(/-/g, '+').replace(/_/g, '/')), c => c.charCodeAt(0));
    const key = await deriveKey(p, blob.slice(0, 16));
    const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: blob.slice(16, 28) }, key, blob.slice(28));
    const data = JSON.parse(D.decode(pt));
    
    if(data.items) {
      let html = `<div class="column" style="background:#121212; height:100vh; justify-content:center;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;">
                      <span class="label">${data.n}</span>
                      <button onclick="location.reload()" style="background:#333; color:#fff; width:auto; padding:4px 10px; margin:0;">Lock</button>
                    </div><div class="scroll">`;
      html += data.items.map(i => `
        <div class="item-row">
          <span class="label" style="font-size:11px; width:70px; opacity:0.8;">${i.l}</span>
          <input type="password" value="${i.v}" readonly onclick="this.type='text'" onblur="this.type='password'" style="background:transparent; border:none; padding:4px;">
          <button onclick="copyText('${i.v.replace(/'/g, "\\'")}', this)" style="width:auto; padding:4px 10px; font-size:9px;">Copy</button>
        </div>`).join('') + `</div></div>`;
      document.getElementById('app').innerHTML = html;
    } else {
      document.getElementById('app').innerHTML = `
        <div class="notion-row">
          <span class="label">${data.n}</span>
          <input type="password" value="${data.v}" readonly id="res" onclick="this.type='text'" onblur="this.type='password'">
          <button onclick="copyText(document.getElementById('res').value, this)" style="width:auto;">Copy</button>
          <button onclick="location.reload()" style="background:#333; color:#fff; width:auto;">Lock</button>
        </div>`;
    }
  } catch(e) { alert("Invalid passphrase."); }
}

function copyText(txt, btn) {
  navigator.clipboard.writeText(txt);
  const old = btn.innerText;
  btn.innerText = 'DONE';
  setTimeout(() => btn.innerText = old, 1000);
}

function init() {
  const h = location.hash.slice(1);
  if(h && h.includes('.')) {
    try {
      const name = fromB64(h.split('.')[0]);
      document.getElementById('app').innerHTML = `
        <div class="notion-row">
          <span class="label">${name}</span>
          <input type="password" id="up" placeholder="Passphrase" onkeydown="if(event.key==='Enter') unlock()">
          <button onclick="unlock()" style="width:auto;">Unlock</button>
        </div>`;
      document.getElementById('up').focus();
    } catch(e) { showGenerator(); }
  } else { 
    showGenerator(); 
  }
}

init();
</script>
</body>
</html>
